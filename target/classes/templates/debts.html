<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BMS | Debt Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-['Inter'] text-slate-800">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-white border-b border-slate-200">
    <div class="text-xl font-bold text-emerald-600 flex items-center gap-2">
        <span class="material-symbols-outlined">analytics</span> BAR SYSTEM
    </div>
    <a th:href="@{/logout}" class="text-red-500 font-bold text-sm">Logout</a>
</header>

<aside class="fixed left-0 top-16 h-full w-64 bg-slate-900 text-slate-300 p-4 hidden md:block">
    <nav class="space-y-2 mt-4">
        <a th:href="@{/dashboard}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800">Admin Dashboard</a>
        <a th:href="@{/reports}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800">Sales Report</a>
        <a th:href="@{/debts}" class="flex items-center gap-3 p-3 rounded-lg bg-emerald-600 text-white font-bold shadow-lg">Debtors List</a>
    </nav>
</aside>

<main class="pt-24 pb-12 px-8 md:ml-64">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Debt Report</h1>
                <p class="text-slate-500 font-medium">Unpaid customer balances</p>
            </div>
            <button onclick="window.print()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-lg font-bold flex items-center gap-2">
                <span class="material-symbols-outlined">picture_as_pdf</span> Download PDF
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="w-full">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400">#</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-left">Customer Name</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-left">Items</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-left">Phone</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-right">Amount Owed</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="debt, iter : ${debtItems}" class="hover:bg-slate-50/80 transition-colors">
                    <td class="px-6 py-5 text-sm text-slate-400" th:text="${iter.index + 1}">1</td>
                    <td class="px-6 py-5 font-bold text-slate-700" th:text="${debt.name}">Name</td>
                    <td class="px-6 py-5 text-slate-600 italic" th:text="${debt.items}">Items</td>
                    <td class="px-6 py-5 text-slate-600" th:text="${debt.phone}">Phone</td>
                    <td class="px-6 py-5 text-right font-black text-red-600"
                        th:text="${#numbers.formatDecimal(debt.amount, 1, 0) + ' RWF'}">0 RWF</td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="bg-slate-900 text-white border-t-4 border-emerald-500">
                    <td colspan="3" class="px-6 py-8"></td>
                    <td class="px-6 py-8 text-right font-bold uppercase text-slate-400 text-xs">Total Outstanding Debt</td>
                    <td class="px-6 py-8 text-right text-3xl font-black text-emerald-400"
                        th:text="${#numbers.formatDecimal(totalDebt, 1, 0) + ' RWF'}">0 RWF</td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</main>
</body>
</html>
