<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #d9f5e3;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 380px;
            background: white;
            border-radius: 18px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        h2 {
            color: #008f4c;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            height: 52px;
            margin-bottom: 18px;
            border: 1.5px solid #00a859;
            border-radius: 14px;
            padding: 0 18px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            background: #00b050;
            color: white;
            border: none;
            padding: 13px 30px;
            border-radius: 13px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #008f4c;
        }

        .links {
            margin-top: 18px;
        }

        .links a {
            text-decoration: none;
            color: #008f4c;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Forgot Password</h2>

    <p>Enter your account email. We will send you a reset code.</p>

    <form th:action="@{/forgot-password}" method="post">
        <input type="email"
               name="email"
               placeholder="Enter your email"
               required>

        <button type="submit">
            Send Reset Code
        </button>
    </form>

    <div class="links">
        <a th:href="@{/login}">
            Back to Login
        </a>
    </div>
</div>

</body>
</html>
