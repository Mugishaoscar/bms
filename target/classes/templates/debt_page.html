<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BMS - Debt Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #ffffff; padding-bottom: 60px; }

        /* Navbar Styling */
        .navbar {
            height: 55px;
            background: #00a859;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            color: white;
        }
        .log {
            background-color: #00a859;
            border-radius: 13px;
            width: 90px;
            color: white;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            border: none;
        }
        .nav-links { display: flex; gap: 30px; margin-left: auto; margin-right: auto; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .admin-btn { background: white; color: #00a859; padding: 5px 25px; border-radius: 20px; font-weight: bold; }

        /* Content Container */
        .container { padding: 40px; }
        h2 { margin-bottom: 20px; }

        /* Table Styling matching your screenshot */
        .debt-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .debt-table th {
            background-color: #D9D9D9; /* Grey header from design */
            border: 1px solid #999;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            text-transform: lowercase; /* Matches your image labels */
        }

        .debt-table td {
            border: 1px solid #999;
            padding: 12px;
            font-size: 14px;
        }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 40px; background-color: #2C446E; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="admin-btn">Admin</div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">product</a>
        <a th:href="@{/admin/employee}">Employee</a>
        <a th:href="@{/admin/report}">Report</a>
        <a th:href="@{/admin/debt}">debt</a>
    </div>
    <div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="log">Logout</button>
        </form>
    </div>
</div>


<div class="container">
    <h2>Debt List</h2>

    <table class="debt-table">
        <thead>
        <tr>
            <th>number</th>
            <th>name</th>
            <th>items</th>
            <th>phone</th>
            <th>amount</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="debt, iterStat : ${debts}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${debt.name}">Name</td>
            <td th:text="${debt.items}">Items</td>
            <td th:text="${debt.phone}">Phone</td>
            <td th:text="${debt.amount}">Amount</td>
        </tr>

        <tr th:if="${#lists.isEmpty(debts)}">
            <td>&nbsp;</td><td></td><td></td><td></td><td></td>
        </tr>
        <tr th:if="${#lists.isEmpty(debts)}">
            <td>&nbsp;</td><td></td><td></td><td></td><td></td>
        </tr>
        </tbody>
    </table>
</div>

<div class="footer"></div>

</body>
</html>
