<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BMS - Employee Management</title>
    <style>
        /* General Styles */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #ffffff; padding-bottom: 60px; }

        /* Navbar Styling */
        .navbar { background-color: #6200EE; padding: 10px 20px; display: flex; align-items: center; color: white; }
        .nav-links { display: flex; gap: 30px; margin-left: auto; margin-right: auto; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .navbar {height: 55px;background: #00a859;display: flex;align-items: center;justify-content: space-between;padding: 0 30px;color: white;}
        .log {
            background-color: #00a859;
            border-radius: 13px;
            width: 90px;
            color: white;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            border: none;
        }
        /* Container & Header */
        .container { padding: 40px; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 24px; }

        /* "New +" Button */
        .btn-new {
            background-color: #6200EE; color: white; border: none;
            padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;
        }

        /* Table Styling matching your design */
        .employee-table { width: 100%; border-collapse: collapse; }
        .employee-table th {
            background-color: #D9D9D9;
            border: 1px solid #999;
            padding: 12px;
            text-align: left;
            text-transform: lowercase; /* Matches your design labels */
            font-weight: bold;
        }
        .employee-table td { border: 1px solid #999; padding: 12px; font-size: 14px; }

        /* Action Buttons */
        .action-btn { text-decoration: none; margin-right: 15px; background: none; border: none; cursor: pointer; font-size: 18px; }
        .edit-btn { color: #4CAF50; }
        .delete-btn { color: #F44336; }

        /* Modal (Popup) Styles */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 10% auto; padding: 30px; border-radius: 10px; width: 400px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 28px; cursor: pointer; color: #aaa; }
        .close:hover { color: black; }

        /* Form Styles inside Modal */
        form input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background-color: #6200EE; color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 40px; background-color: #2C446E; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="admin-btn">Admin</div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">product</a>
        <a th:href="@{/admin/employee}">Employee</a>
        <a th:href="@{/admin/report}">Report</a>
        <a th:href="@{/admin/debt}">debt</a>
    </div>
    <div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="log">Logout</button>
        </form>
    </div>
</div>


<div class="container">
    <div class="header-section">
        <h2>My Employees</h2>
        <button class="btn-new" onclick="openNewModal()">New +</button>
    </div>

    <table class="employee-table">
        <thead>
        <tr>
            <th>number</th>
            <th>name</th>
            <th>position</th>
            <th>phone</th>
            <th>username</th>
            <th>action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp, iter : ${employees}">
            <td th:text="${iter.count}">1</td>
            <td th:text="${emp.name}">Name</td>
            <td th:text="${emp.position}">Position</td>
            <td th:text="${emp.phone}">Phone</td>
            <td th:text="${emp.username}">Username</td>
            <td>
                <button class="action-btn edit-btn"
                        th:data-id="${emp.id}"
                        th:data-name="${emp.name}"
                        th:data-position="${emp.position}"
                        th:data-phone="${emp.phone}"
                        th:data-username="${emp.username}"
                        th:data-password="${emp.password}"
                        onclick="prepareEdit(this)">
                    ✏️
                </button>
                <a th:href="@{'/admin/employee/delete/' + ${emp.id}}"
                   class="action-btn delete-btn"
                   onclick="return confirm('Delete this employee?')">🗑️</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="6" style="text-align: center; color: #999;">No employees found.</td>
        </tr>
        </tbody>
    </table>
</div>

<div id="empModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Add New Employee</h3>
        <form th:action="@{/admin/employee/save}" method="post">
            <input type="hidden" id="empId" name="id">

            <input type="text" id="empName" name="name" placeholder="Full Name" required>
            <input type="text" id="empPosition" name="position" placeholder="Position" required>
            <input type="text" id="empPhone" name="phone" placeholder="Phone Number" required>
            <input type="text" id="empUsername" name="username" placeholder="Login Username" required>
            <input type="password" id="empPassword" name="password" placeholder="Password" required>

            <button type="submit" class="btn-save" id="saveBtn">Save Employee</button>
        </form>
    </div>
</div>

<div class="footer"></div>

<script>
    // 1. This function safely reads the data attributes
    function prepareEdit(button) {
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const position = button.getAttribute('data-position');
        const phone = button.getAttribute('data-phone');
        const username = button.getAttribute('data-username');
        const password = button.getAttribute('data-password');

        // 2. Call the original function to fill the modal
        editEmployee(id, name, position, phone, username, password);
    }

    function editEmployee(id, name, position, phone, username, password) {
        document.getElementById('modalTitle').innerText = "Edit Employee";
        document.getElementById('saveBtn').innerText = "Update Employee";

        document.getElementById('empId').value = id;
        document.getElementById('empName').value = name;
        document.getElementById('empPosition').value = position;
        document.getElementById('empPhone').value = phone;
        document.getElementById('empUsername').value = username;
        document.getElementById('empPassword').value = password;

        document.getElementById('empModal').style.display = 'block';
    }

    function openNewModal() {
        document.getElementById('modalTitle').innerText = "Add New Employee";
        document.getElementById('saveBtn').innerText = "Save Employee";
        document.getElementById('empId').value = "";
        document.querySelector('form').reset();
        document.getElementById('empModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('empModal').style.display = 'none';
    }

    window.onclick = function(event) {
        let modal = document.getElementById('empModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
