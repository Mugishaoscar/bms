<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BMS | Sales Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        @media print {
            .no-print { display: none !important; }
            aside { display: none !important; }
            main { margin-left: 0 !important; padding-top: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-['Inter'] text-slate-800">

<header class="no-print fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-white border-b border-slate-200">
    <div class="text-xl font-bold text-emerald-600 flex items-center gap-2">
        <span class="material-symbols-outlined">analytics</span> BAR SYSTEM
    </div>
    <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Live System</span>
        </div>
        <a th:href="@{/logout}" class="text-red-500 hover:text-red-700 font-bold text-sm flex items-center gap-1">
            <span class="material-symbols-outlined text-lg">logout</span> Logout
        </a>
    </div>
</header>

<aside class="no-print fixed left-0 top-16 h-full w-64 bg-slate-900 text-slate-300 p-4 hidden md:block">
    <nav class="space-y-2 mt-4">
        <a th:href="@{/dashboard}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition-all text-sm">
            <span class="material-symbols-outlined">grid_view</span> Admin Dashboard
        </a>
        <a th:href="@{/products}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition-all text-sm">
            <span class="material-symbols-outlined">inventory_2</span> Products & Stock
        </a>
        <a th:href="@{/reports}" class="flex items-center gap-3 p-3 rounded-lg bg-emerald-600 text-white shadow-lg shadow-emerald-900/20 text-sm font-bold">
            <span class="material-symbols-outlined">receipt_long</span> Sales Report
        </a>
        <a th:href="@{/debts}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition-all text-sm">
            <span class="material-symbols-outlined">group</span> Debtors List
        </a>
    </nav>
</aside>

<main class="pt-24 pb-12 px-8 md:ml-64">
    <div class="max-w-5xl mx-auto">

        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Sales Report</h1>
                <p class="text-slate-500 font-medium">Recorded Daily Transactions</p>
            </div>
            <button onclick="window.print()" class="no-print bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-emerald-600/20">
                <span class="material-symbols-outlined">picture_as_pdf</span> Download PDF
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="w-full">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400">#</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-left">Item Description</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-right">Qty</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-right">Price</th>
                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400 text-right tracking-widest">Total Amount</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="sale, iter : ${salesItems}" class="hover:bg-slate-50/80 transition-colors">
                    <td class="px-6 py-5 text-sm text-slate-400" th:text="${iter.index + 1}">1</td>
                    <td class="px-6 py-5 font-bold text-slate-700 uppercase" th:text="${sale.itemName}">Item</td>
                    <td class="px-6 py-5 text-right text-slate-600 font-medium" th:text="${sale.quantity}">0</td>
                    <td class="px-6 py-5 text-right text-slate-600" th:text="${#numbers.formatDecimal(sale.pricePerUnit, 1, 0) + ' RWF'}">0</td>
                    <td class="px-6 py-5 text-right font-black text-slate-900" th:text="${#numbers.formatDecimal(sale.amount, 1, 0) + ' RWF'}">0</td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="bg-slate-900 text-white border-t-4 border-emerald-500">
                    <td colspan="3" class="px-6 py-8"></td>
                    <td class="px-6 py-8 text-right font-bold uppercase text-slate-400 text-xs">Grand Total Revenue</td>
                    <td class="px-6 py-8 text-right text-3xl font-black text-emerald-400"
                        th:text="${#numbers.formatDecimal(totalAmount, 1, 0) + ' RWF'}">0 RWF</td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</main>
</body>
</html>
