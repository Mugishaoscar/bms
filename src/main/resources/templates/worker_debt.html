<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Worker Debt</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5fff8; }
        .navbar {
            height: 55px; background: #00a859; display: flex;
            align-items: center;
            justify-content: space-between; padding: 0 30px; color: white;
        }
        .nav-links a { color: white; text-decoration: none; margin: 0 18px; }
        .logout {
            background: #007a3d; color: white; border: none;
            padding: 8px 18px; border-radius: 10px; cursor: pointer;
        }
        .content { padding: 35px; }
        h2 { color: #008f4c; }
        table {
            width: 100%; border-collapse: collapse; background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        th { background: #00a859; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        .badge {
            padding: 6px 12px; border-radius: 10px; font-weight: bold;
            background: #ffe0e0; color: #cc0000;
        }
    </style>
</head>
<body>

<div class="navbar">
    <strong>Worker</strong>

    <div class="nav-links">
        <a th:href="@{/worker/dashboard}">Product</a>
        <a th:href="@{/worker/sales}">Sales</a>
        <a th:href="@{/worker/report}">Report</a>
        <a th:href="@{/worker/debt}">Debt</a>
    </div>

    <form th:action="@{/logout}" method="post">
        <button class="logout" type="submit">Logout</button>
    </form>
</div>

<div class="content">
    <h2>Debt Records</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="debt : ${debts}">
            <td th:text="${debt.id}"></td>
            <td th:text="${debt.customerName}"></td>
            <td th:text="${debt.customerPhone}"></td>
            <td th:text="${debt.customerEmail}"></td>
            <td><span th:text="${debt.totalAmount}"></span> RWF</td>
            <td th:text="${debt.dateTime}"></td>
            <td>
                <form th:action="@{/worker/debt/update}" method="post">
                    <input type="hidden" name="id" th:value="${debt.id}">

                    <select name="status">
                        <option value="UNPAID" th:selected="${debt.status == 'UNPAID'}">UNPAID</option>
                        <option value="PAID" th:selected="${debt.status == 'PAID'}">PAID</option>
                    </select>

                    <button type="submit">Update</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
