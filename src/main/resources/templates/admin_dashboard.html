<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BMS - Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #ffffff; padding-bottom: 60px; }
        .navbar { background-color: #6200EE; padding: 10px 20px; display: flex; align-items: center; color: white; }
        .nav-links { display: flex; gap: 30px; margin-left: auto; margin-right: auto; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .admin-btn { background: white; color: black; padding: 5px 25px; border-radius: 20px; font-weight: bold; }
        .container { padding: 40px; }
        .action-bar { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .new-btn { background-color: #00FF00; color: white; padding: 10px 40px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        /* Grid & Clickable Cards */
        .product-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .product-card {
            width: 180px; background: #D9D9D9; border-radius: 8px; overflow: hidden;
            text-align: center; cursor: pointer; transition: transform 0.2s;
        }
        .product-card:hover { transform: scale(1.03); }

        .image-container { background: white; padding: 15px; height: 150px; display: flex; justify-content: center; align-items: center; margin: 5px; border-radius: 5px; }
        .image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { padding: 10px; display: flex; justify-content: space-around; font-weight: bold; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 5% auto; padding: 25px; border-radius: 12px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 95%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .save-btn { background-color: #6200EE; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .cancel-btn { background-color: #757575; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .footer { position: fixed; bottom: 0; width: 100%; height: 40px; background-color: #2C446E; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="admin-btn">admin</div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">product</a>
        <a href="#">Employee</a>
        <a href="#">report</a>
        <a th:href="@{/admin/debt}">debt</a>
    </div>
</div>

<div class="container">
    <div class="action-bar">
        <button class="new-btn" onclick="openModalForAdd()">New</button>
    </div>

    <div class="product-grid">
        <div th:if="${#lists.isEmpty(products)}">No products found.</div>

        <div class="product-card" th:each="product : ${products}"
             th:onclick="openModalForEdit([[${product.id}]], [[${product.name}]], [[${product.price}]], [[${product.stockQuantity}]], [[${product.imageUrl}]])">
            <div class="image-container">
                <img th:src="${product.imageUrl != null and product.imageUrl != ''} ? @{'/images/' + ${product.imageUrl}} : 'https://via.placeholder.com/150'" alt="Product">
            </div>
            <div class="product-info">
                <span th:text="${product.name}">Name</span>
                <span th:text="${product.stockQuantity}">0</span>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Add New Product</h2>
        </div>
        <form th:action="@{/admin/saveProduct}" method="POST">
            <input type="hidden" name="id" id="productId">

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" id="name" required>
            </div>
            <div class="form-group">
                <label>Price (RWF)</label>
                <input type="number" step="0.01" name="price" id="price" required>
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" name="stockQuantity" id="stockQuantity" required>
            </div>
            <div class="form-group">
                <label>Image Filename</label>
                <input type="text" name="imageUrl" id="imageUrl">
            </div>
            <div class="modal-footer">
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button type="submit" class="save-btn">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<div class="footer"></div>

<script th:inline="javascript">
    const modal = document.getElementById("productModal");

    // Open for a completely NEW product
    function openModalForAdd() {
        document.getElementById("modalTitle").innerText = "Add New Product";
        document.getElementById("productId").value = ""; // Clear ID
        document.querySelector("form").reset(); // Clear form
        modal.style.display = "block";
    }

    // Open and FILL with existing product data
    function openModalForEdit(id, name, price, stock, image) {
        document.getElementById("modalTitle").innerText = "Edit Product";
        document.getElementById("productId").value = id;
        document.getElementById("name").value = name;
        document.getElementById("price").value = price;
        document.getElementById("stockQuantity").value = stock;
        document.getElementById("imageUrl").value = image;
        modal.style.display = "block";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    }
</script>
</body>
</html>
