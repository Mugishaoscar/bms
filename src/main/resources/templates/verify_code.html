<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - BMS</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            background: linear-gradient(135deg,#00a859,#003f24);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:420px;
            background:white;
            border-radius:22px;
            padding:40px;
            box-shadow:0 10px 35px rgba(0,0,0,0.2);
        }

        .logo{
            width:75px;
            height:75px;
            background:#00a859;
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:30px;
            font-weight:bold;
        }

        h2{
            text-align:center;
            color:#007a3d;
            margin-bottom:8px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            font-size:14px;
            margin-bottom:28px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1.5px solid #ddd;
            border-radius:14px;
            outline:none;
            transition:0.3s;
            font-size:15px;
        }

        .input-group input:focus{
            border-color:#00a859;
            box-shadow:0 0 0 4px rgba(0,168,89,0.15);
        }

        .reset-btn{
            width:100%;
            background:#00a859;
            border:none;
            padding:15px;
            border-radius:14px;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .reset-btn:hover{
            background:#007a3d;
        }

        .back-link{
            text-align:center;
            margin-top:20px;
        }

        .back-link a{
            text-decoration:none;
            color:#007a3d;
            font-weight:600;
        }

        .back-link a:hover{
            text-decoration:underline;
        }

        .error{
            background:#ffe5e5;
            color:#cc0000;
            padding:12px;
            border-radius:12px;
            margin-bottom:18px;
            text-align:center;
        }

        .success{
            background:#e6fff0;
            color:#007a3d;
            padding:12px;
            border-radius:12px;
            margin-bottom:18px;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="logo">B</div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Enter the code sent to your email and choose a new password
    </p>

    <div th:if="${param.sent}" class="success">
        Reset code sent successfully to your email.
    </div>

    <div th:if="${param.error}" class="error">

        <span th:if="${param.error[0] == 'invalid_code'}">
            Invalid reset code.
        </span>

        <span th:if="${param.error[0] == 'password_mismatch'}">
            Passwords do not match.
        </span>

        <span th:if="${param.error[0] == 'user_not_found'}">
            User not found.
        </span>

    </div>

    <form th:action="@{/verify-code}" method="post">

        <div class="input-group">a
            <label>Email</label>
            <input type="text"
                   name="email"
                   placeholder="Enter your email"
                   required>
        </div>

        <div class="input-group">
            <label>Reset Code</label>
            <input type="text"
                   name="code"
                   placeholder="Enter reset code"
                   required>
        </div>

        <div class="input-group">
            <label>New Password</label>
            <input type="password"
                   name="newPassword"
                   placeholder="New password"
                   required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password"
                   name="confirmPassword"
                   placeholder="Confirm password"
                   required>
        </div>

        <button type="submit" class="reset-btn">
            Reset Password
        </button>

    </form>

    <div class="back-link">
        <a th:href="@{/login}">
            ← Back to Login
        </a>
    </div>

</div>

</body>
</html>
